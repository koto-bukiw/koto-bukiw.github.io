<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JLPT N5 Latihan - Belajar Bahasa Jepang</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"></script>
  <!-- 問題データ -->
  <script src="data/kanji-yomi.js"></script>
  <script src="data/hyouki.js"></script>
  <script src="data/iikae.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useCallback, useMemo } = React;

    // ============================================
    // 型定義（TypeScript相当のコメント）
    // ============================================
    // Question: { id, question, highlight, options, answer, translation }
    // QuizCategory: { id, title, titleJp, icon, description, data }
    // QuizState: 'menu' | 'quiz' | 'result'

    // ============================================
    // カテゴリ定義
    // ============================================
    const CATEGORIES = [
      {
        id: 'kanji-yomi',
        title: 'Membaca Kanji',
        titleJp: '問題1：漢字読み',
        icon: 'fa-book-open',
        description: 'Pilih cara baca (hiragana) yang benar untuk kanji yang digaris bawahi.',
        descJp: '下線の漢字の読み方を選んでください。',
        color: '#e74c3c',
        data: kanjiYomiData
      },
      {
        id: 'hyouki',
        title: 'Penulisan',
        titleJp: '問題2：表記（ひょうき）',
        icon: 'fa-pen-nib',
        description: 'Pilih penulisan kanji/katakana yang benar untuk kata bergaris bawah.',
        descJp: '下線のことばはどう書きますか。',
        color: '#3498db',
        data: hyoukiData
      },
      {
        id: 'iikae',
        title: 'Parafrase / Sinonim',
        titleJp: '問題4：言い換え類義',
        icon: 'fa-arrows-rotate',
        description: 'Pilih kata/frasa yang memiliki arti sama dengan kata bergaris bawah.',
        descJp: '下線のことばと同じ意味のものを選んでください。',
        color: '#2ecc71',
        data: iikaeData
      }
    ];

    const QUESTIONS_PER_QUIZ = 5;

    // ============================================
    // ユーティリティ関数
    // ============================================
    function shuffleArray(arr) {
      const shuffled = [...arr];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }

    function pickRandomQuestions(data, count) {
      const shuffled = shuffleArray(data);
      return shuffled.slice(0, count).map(q => {
        // 選択肢をシャッフルし、正解インデックスも更新
        const correctAnswer = q.options[q.answer];
        const shuffledOptions = shuffleArray(q.options);
        const newAnswerIndex = shuffledOptions.indexOf(correctAnswer);
        return { ...q, options: shuffledOptions, answer: newAnswerIndex };
      });
    }

    // 【】で囲まれた部分をハイライト表示
    function renderQuestion(text) {
      const parts = text.split(/【|】/);
      return parts.map((part, i) => {
        if (i % 2 === 1) {
          return <span key={i} className="highlight-word">{part}</span>;
        }
        return <span key={i}>{part}</span>;
      });
    }

    // ============================================
    // ヘッダーコンポーネント
    // ============================================
    function Header({ onBack, showBack }) {
      return (
        <header className="app-header">
          <div className="header-inner">
            {showBack ? (
              <button className="back-btn" onClick={onBack}>
                <i className="fas fa-arrow-left"></i>
                <span>Kembali</span>
              </button>
            ) : <div style={{width: '100px'}} />}
            <div className="header-title">
              <div className="header-logo">
                <i className="fas fa-torii-gate"></i>
              </div>
              <div>
                <h1>JLPT N5 Latihan</h1>
                <p>日本語能力試験 N5 練習</p>
              </div>
            </div>
            <div style={{width: '100px'}} />
          </div>
        </header>
      );
    }

    // ============================================
    // メニュー画面
    // ============================================
    function MenuScreen({ onSelectCategory }) {
      return (
        <div className="menu-screen">
          <div className="welcome-section">
            <div className="welcome-icon">
              <i className="fas fa-graduation-cap"></i>
            </div>
            <h2>Selamat Datang! ようこそ！</h2>
            <p>Pilih jenis soal untuk memulai latihan JLPT N5.</p>
            <p className="sub-text">練習する問題を選んでください。</p>
          </div>

          <div className="category-grid">
            {CATEGORIES.map(cat => (
              <button
                key={cat.id}
                className="category-card"
                onClick={() => onSelectCategory(cat)}
                style={{ '--card-color': cat.color }}
              >
                <div className="card-icon" style={{ background: cat.color }}>
                  <i className={`fas ${cat.icon}`}></i>
                </div>
                <div className="card-content">
                  <h3>{cat.titleJp}</h3>
                  <p className="card-title-id">{cat.title}</p>
                  <p className="card-desc">{cat.description}</p>
                  <div className="card-meta">
                    <span><i className="fas fa-database"></i> {cat.data.length} soal</span>
                    <span><i className="fas fa-random"></i> {QUESTIONS_PER_QUIZ} soal acak</span>
                  </div>
                </div>
                <div className="card-arrow">
                  <i className="fas fa-chevron-right"></i>
                </div>
              </button>
            ))}
          </div>

          <div className="info-box">
            <i className="fas fa-info-circle"></i>
            <div>
              <strong>Cara bermain:</strong> Setiap sesi akan menampilkan {QUESTIONS_PER_QUIZ} soal acak. 
              Pilihan jawaban juga akan diacak setiap kali Anda memulai.
              <br/>
              <span className="jp-text">毎回ランダムで{QUESTIONS_PER_QUIZ}問が出題されます。選択肢の順番もランダムです。</span>
            </div>
          </div>
        </div>
      );
    }

    // ============================================
    // クイズ画面
    // ============================================
    function QuizScreen({ category, onFinish }) {
      const [questions] = useState(() => pickRandomQuestions(category.data, QUESTIONS_PER_QUIZ));
      const [currentIndex, setCurrentIndex] = useState(0);
      const [selectedOption, setSelectedOption] = useState(null);
      const [answered, setAnswered] = useState(false);
      const [results, setResults] = useState([]);

      const currentQ = questions[currentIndex];
      const isCorrect = selectedOption === currentQ.answer;
      const progress = ((currentIndex) / questions.length) * 100;

      const handleSelect = (optIndex) => {
        if (answered) return;
        setSelectedOption(optIndex);
        setAnswered(true);
        setResults(prev => [...prev, {
          question: currentQ,
          selected: optIndex,
          correct: optIndex === currentQ.answer
        }]);
      };

      const handleNext = () => {
        if (currentIndex + 1 >= questions.length) {
          onFinish(results);
        } else {
          setCurrentIndex(prev => prev + 1);
          setSelectedOption(null);
          setAnswered(false);
        }
      };

      const getOptionClass = (optIndex) => {
        if (!answered) return 'option-btn';
        if (optIndex === currentQ.answer) return 'option-btn option-correct';
        if (optIndex === selectedOption && optIndex !== currentQ.answer) return 'option-btn option-wrong';
        return 'option-btn option-disabled';
      };

      return (
        <div className="quiz-screen">
          <div className="quiz-header">
            <div className="quiz-category-badge" style={{ background: category.color }}>
              <i className={`fas ${category.icon}`}></i>
              <span>{category.titleJp}</span>
            </div>
            <div className="quiz-progress-info">
              <span>Soal {currentIndex + 1} / {questions.length}</span>
            </div>
          </div>

          <div className="progress-bar-container">
            <div className="progress-bar" style={{ width: `${progress}%`, background: category.color }}></div>
          </div>

          <div className="question-card">
            <div className="question-number">
              <span className="q-num">Q{currentIndex + 1}</span>
            </div>
            <p className="question-text">{renderQuestion(currentQ.question)}</p>
            <p className="question-translation">
              <i className="fas fa-language"></i> {currentQ.translation}
            </p>
          </div>

          <div className="options-grid">
            {currentQ.options.map((opt, i) => (
              <button
                key={i}
                className={getOptionClass(i)}
                onClick={() => handleSelect(i)}
                disabled={answered}
              >
                <span className="option-number">{i + 1}</span>
                <span className="option-text">{opt}</span>
                {answered && i === currentQ.answer && (
                  <i className="fas fa-check-circle option-icon"></i>
                )}
                {answered && i === selectedOption && i !== currentQ.answer && (
                  <i className="fas fa-times-circle option-icon"></i>
                )}
              </button>
            ))}
          </div>

          {answered && (
            <div className={`feedback-box ${isCorrect ? 'feedback-correct' : 'feedback-wrong'}`}>
              <div className="feedback-header">
                {isCorrect ? (
                  <>
                    <i className="fas fa-check-circle"></i>
                    <span>Benar! 正解！ 🎉</span>
                  </>
                ) : (
                  <>
                    <i className="fas fa-times-circle"></i>
                    <span>Salah... 不正解 😥</span>
                  </>
                )}
              </div>
              {!isCorrect && (
                <p className="feedback-answer">
                  Jawaban yang benar: <strong>{currentQ.options[currentQ.answer]}</strong>
                </p>
              )}
              <button className="next-btn" onClick={handleNext} style={{ background: category.color }}>
                {currentIndex + 1 >= questions.length ? (
                  <><i className="fas fa-trophy"></i> Lihat Hasil</>
                ) : (
                  <><i className="fas fa-arrow-right"></i> Soal Berikutnya</>
                )}
              </button>
            </div>
          )}
        </div>
      );
    }

    // ============================================
    // 結果画面
    // ============================================
    function ResultScreen({ category, results, onRetry, onMenu }) {
      const correctCount = results.filter(r => r.correct).length;
      const totalCount = results.length;
      const percentage = Math.round((correctCount / totalCount) * 100);

      const getGrade = () => {
        if (percentage === 100) return { emoji: '🏆', text: 'Sempurna!', textJp: '完璧！', class: 'grade-perfect' };
        if (percentage >= 80) return { emoji: '🎉', text: 'Hebat!', textJp: 'すごい！', class: 'grade-great' };
        if (percentage >= 60) return { emoji: '👍', text: 'Bagus!', textJp: 'いいね！', class: 'grade-good' };
        if (percentage >= 40) return { emoji: '💪', text: 'Terus berusaha!', textJp: 'がんばって！', class: 'grade-ok' };
        return { emoji: '📚', text: 'Ayo belajar lagi!', textJp: 'もっとがんばろう！', class: 'grade-low' };
      };

      const grade = getGrade();

      return (
        <div className="result-screen">
          <div className={`result-hero ${grade.class}`}>
            <div className="result-emoji">{grade.emoji}</div>
            <h2>{grade.text}</h2>
            <p className="result-jp">{grade.textJp}</p>
            <div className="result-score">
              <div className="score-circle" style={{ '--score-pct': `${percentage}%`, '--score-color': category.color }}>
                <span className="score-number">{correctCount}</span>
                <span className="score-divider">/</span>
                <span className="score-total">{totalCount}</span>
              </div>
              <p className="score-percent">{percentage}% benar</p>
            </div>
          </div>

          <div className="result-details">
            <h3><i className="fas fa-list-check"></i> Detail Jawaban</h3>
            {results.map((r, i) => (
              <div key={i} className={`result-item ${r.correct ? 'item-correct' : 'item-wrong'}`}>
                <div className="result-item-header">
                  <span className="result-q-num">Q{i + 1}</span>
                  {r.correct ? (
                    <span className="result-badge badge-correct"><i className="fas fa-check"></i> Benar</span>
                  ) : (
                    <span className="result-badge badge-wrong"><i className="fas fa-times"></i> Salah</span>
                  )}
                </div>
                <p className="result-question">{renderQuestion(r.question.question)}</p>
                <div className="result-answers">
                  {!r.correct && (
                    <p className="your-answer">
                      <i className="fas fa-times"></i> Jawaban Anda: <strong>{r.question.options[r.selected]}</strong>
                    </p>
                  )}
                  <p className="correct-answer">
                    <i className="fas fa-check"></i> Jawaban benar: <strong>{r.question.options[r.question.answer]}</strong>
                  </p>
                </div>
              </div>
            ))}
          </div>

          <div className="result-actions">
            <button className="retry-btn" onClick={onRetry} style={{ background: category.color }}>
              <i className="fas fa-redo"></i> Coba Lagi ({category.title})
            </button>
            <button className="menu-btn" onClick={onMenu}>
              <i className="fas fa-home"></i> Kembali ke Menu
            </button>
          </div>
        </div>
      );
    }

    // ============================================
    // メインApp
    // ============================================
    function App() {
      const [screen, setScreen] = useState('menu');
      const [selectedCategory, setSelectedCategory] = useState(null);
      const [quizResults, setQuizResults] = useState(null);
      const [quizKey, setQuizKey] = useState(0);

      const handleSelectCategory = (cat) => {
        setSelectedCategory(cat);
        setScreen('quiz');
        setQuizKey(prev => prev + 1);
      };

      const handleFinish = (results) => {
        setQuizResults(results);
        setScreen('result');
      };

      const handleRetry = () => {
        setScreen('quiz');
        setQuizKey(prev => prev + 1);
        setQuizResults(null);
      };

      const handleMenu = () => {
        setScreen('menu');
        setSelectedCategory(null);
        setQuizResults(null);
      };

      return (
        <div className="app">
          <Header
            showBack={screen !== 'menu'}
            onBack={handleMenu}
          />
          <main className="main-content">
            {screen === 'menu' && (
              <MenuScreen onSelectCategory={handleSelectCategory} />
            )}
            {screen === 'quiz' && selectedCategory && (
              <QuizScreen
                key={quizKey}
                category={selectedCategory}
                onFinish={handleFinish}
              />
            )}
            {screen === 'result' && selectedCategory && quizResults && (
              <ResultScreen
                category={selectedCategory}
                results={quizResults}
                onRetry={handleRetry}
                onMenu={handleMenu}
              />
            )}
          </main>
          <footer className="app-footer">
            <p>JLPT N5 Latihan &copy; 2026 | Untuk pelajar bahasa Jepang dari Indonesia 🇮🇩🇯🇵</p>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
