<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ひらがな・カタカナ学習</title>
<style>
  :root {
    --primary-hira: #4A90D9;
    --primary-hira-light: #e8f0fe;
    --primary-kata: #D94A7A;
    --primary-kata-light: #fde8ef;
    --bg: #f5f5f5;
    --card-bg: #ffffff;
    --text: #333333;
    --highlight-hira: #2563eb;
    --highlight-kata: #db2777;
    --shadow: 0 2px 8px rgba(0,0,0,0.10);
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP','Yu Gothic',sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== Header ===== */
  header {
    position: sticky; top: 0; z-index: 100;
    background: #fff;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .header-inner {
    max-width: 800px; margin: 0 auto;
    padding: 12px 16px 0; text-align: center;
  }
  .header-inner h1 { font-size: 1.15rem; margin-bottom: 10px; letter-spacing: .05em; }
  .tab-bar { display: flex; }
  .tab-btn {
    flex: 1; padding: 10px 0; border: none; background: transparent;
    font-size: 1rem; font-weight: 700; cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all .25s; color: #999; font-family: inherit;
  }
  .tab-btn.active-hira { color: var(--primary-hira); border-bottom-color: var(--primary-hira); }
  .tab-btn.active-kata { color: var(--primary-kata); border-bottom-color: var(--primary-kata); }

  /* ===== Main ===== */
  main { max-width: 800px; margin: 0 auto; padding: 16px 10px 100px; }
  .page { display: none; }
  .page.active { display: block; }

  /* ===== Grid ===== */
  .section-label {
    font-size: .82rem; font-weight: 700; color: #888;
    margin: 18px 0 8px 4px; letter-spacing: .08em;
  }
  .gojuon-grid {
    display: grid; grid-template-columns: repeat(5,1fr);
    gap: 6px; margin-bottom: 12px;
  }
  .kana-cell {
    aspect-ratio: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: var(--card-bg); border-radius: var(--radius);
    box-shadow: var(--shadow); cursor: pointer;
    transition: transform .12s, box-shadow .12s;
    user-select: none; -webkit-tap-highlight-color: transparent;
    border: 2px solid transparent;
  }
  .kana-cell:active { transform: scale(.93); }
  .kana-cell.hira-cell:hover,.kana-cell.hira-cell:active {
    border-color: var(--primary-hira); box-shadow: 0 4px 16px rgba(74,144,217,.25);
  }
  .kana-cell.kata-cell:hover,.kana-cell.kata-cell:active {
    border-color: var(--primary-kata); box-shadow: 0 4px 16px rgba(217,74,122,.25);
  }
  .kana-cell .kana-char {
    font-size: clamp(1.4rem,5vw,2.2rem); font-weight: 700; line-height: 1.2;
  }
  .hira-cell .kana-char { color: var(--primary-hira); }
  .kata-cell .kana-char { color: var(--primary-kata); }
  .kana-cell .romaji {
    font-size: clamp(.55rem,1.8vw,.78rem); color: #aaa; margin-top: 2px;
  }
  .kana-cell.empty { visibility: hidden; }

  /* ===== Modal ===== */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.45); z-index: 200;
    align-items: center; justify-content: center;
    padding: 24px; animation: fadeIn .2s;
  }
  .modal-overlay.show { display: flex; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  @keyframes slideUp { from{transform:translateY(30px);opacity:0} to{transform:translateY(0);opacity:1} }

  .modal-card {
    background: #fff; border-radius: 20px;
    padding: 28px 20px 24px; max-width: 360px; width: 100%;
    text-align: center;
    box-shadow: 0 12px 40px rgba(0,0,0,.2);
    animation: slideUp .25s; position: relative;
  }
  .modal-close {
    position: absolute; top: 10px; right: 14px;
    background: none; border: none; font-size: 1.6rem;
    cursor: pointer; color: #bbb; line-height: 1; font-family: inherit;
  }

  /* メインのかな表示エリア */
  .modal-main {
    display: flex; align-items: center; justify-content: center;
    gap: 12px; margin-bottom: 4px;
  }
  .modal-kana {
    font-size: 4.2rem; font-weight: 800; line-height: 1.1;
  }
  .modal-kana.hira { color: var(--primary-hira); }
  .modal-kana.kata { color: var(--primary-kata); }

  .speak-btn {
    width: 44px; height: 44px; border-radius: 50%;
    border: none; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    transition: opacity .15s, transform .12s;
    flex-shrink: 0;
  }
  .speak-btn:active { opacity: .65; transform: scale(.9); }
  .speak-btn svg { width: 22px; height: 22px; fill: #fff; }
  .speak-btn.hira { background: var(--primary-hira); }
  .speak-btn.kata { background: var(--primary-kata); }

  .modal-romaji {
    font-size: 1.2rem; color: #999; margin: 2px 0 18px;
  }

  /* 例セクション */
  .example-box {
    background: #f8f8fa; border-radius: 14px;
    padding: 10px 10px 6px; text-align: left;
  }
  .example-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 8px; border-radius: 10px;
    margin-bottom: 4px;
    transition: background .12s;
  }
  .example-item:last-child { margin-bottom: 0; }
  .example-item:active { background: #eee; }

  .speak-btn-sm {
    width: 34px; height: 34px; border-radius: 50%;
    border: none; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: opacity .15s, transform .12s;
  }
  .speak-btn-sm:active { opacity: .65; transform: scale(.9); }
  .speak-btn-sm svg { width: 17px; height: 17px; fill: #fff; }
  .speak-btn-sm.hira { background: var(--primary-hira); }
  .speak-btn-sm.kata { background: var(--primary-kata); }

  .example-text { flex: 1; min-width: 0; }
  .example-word {
    font-size: 1.35rem; font-weight: 700; line-height: 1.35;
  }
  .example-meaning {
    font-size: .8rem; color: #888; margin-top: 1px;
  }
  mark.hira {
    background: none; color: var(--highlight-hira); font-weight: 800;
    text-decoration: underline;
    text-decoration-color: rgba(37,99,235,.3);
    text-underline-offset: 3px;
  }
  mark.kata {
    background: none; color: var(--highlight-kata); font-weight: 800;
    text-decoration: underline;
    text-decoration-color: rgba(219,39,119,.3);
    text-underline-offset: 3px;
  }

  @media(min-width:600px){
    .gojuon-grid{gap:8px}
    main{padding:20px 20px 80px}
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <h1>Belajar Hiragana &amp; Katakana</h1>
    <div class="tab-bar">
      <button class="tab-btn active-hira" id="tabHira" onclick="switchPage('hiragana')">ひらがな</button>
      <button class="tab-btn" id="tabKata" onclick="switchPage('katakana')">カタカナ</button>
    </div>
  </div>
</header>

<main>
  <div class="page active" id="pageHira"></div>

</main>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="closeModalOutside(event)">

    <div class="modal-main">

    <div class="example-box" id="modalExamples"></div>

// ====================================================
// Build pages
// ====================================================
function buildPage(type) {
  const isHira = type === 'hiragana';
  const container = isHira ? document.getElementById('pageHira') : document.getElementById('pageKata');
  const cellClass = isHira ? 'hira-cell' : 'kata-cell';
  let html = '';

  html += `<div class="section-label">清音 — Seion</div><div class="gojuon-grid">`;
  kanaData.seion.forEach(item => {
    if (!item) { html += `<div class="kana-cell empty"></div>`; return; }
    const ch = isHira ? item[0] : item[1], rm = item[2];
    html += `<div class="kana-cell ${cellClass}" onclick="openModal('${ch}','${rm}','${type}')">
      <span class="kana-char">${ch}</span><span class="romaji">${rm}</span></div>`;
  });
  html += `</div>`;

  html += `<div class="section-label">濁音・半濁音 — Dakuon / Handakuon</div><div class="gojuon-grid">`;
  kanaData.dakuon.forEach(item => {
    const ch = isHira ? item[0] : item[1], rm = item[2];
    html += `<div class="kana-cell ${cellClass}" onclick="openModal('${ch}','${rm}','${type}')">
      <span class="kana-char">${ch}</span><span class="romaji">${rm}</span></div>`;
  });
  html += `</div>`;

  container.innerHTML = html;
}

// ====================================================
// Tab switch
// ====================================================
function switchPage(type) {
  const h = type === 'hiragana';
  document.getElementById('pageHira').classList.toggle('active', h);
  document.getElementById('pageKata').classList.toggle('active', !h);
  document.getElementById('tabHira').className = 'tab-btn' + (h ? ' active-hira' : '');
  document.getElementById('tabKata').className = 'tab-btn' + (!h ? ' active-kata' : '');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

  currentKana = char;

  if (raw) {
    raw.split(';').forEach(entry => {
      const [word, meaning] = entry.split(',');
      if (!word) return;
      const highlighted = highlightChar(word.trim(), char, cls);
      const item = document.createElement('div');
      item.className = 'example-item';
      item.innerHTML = `
        <button class="speak-btn-sm ${cls}" onclick="event.stopPropagation();speak('${word.trim()}')">${svgSpeaker}</button>
        <div class="example-text">
          <div class="example-word">${highlighted}</div>
          <div class="example-meaning">${meaning ? meaning.trim() : ''}</div>
        </div>`;
      exDiv.appendChild(item);
    });
  }

  document.getElementById('modal').classList.add('show');
  document.body.style.overflow = 'hidden';
  speak(char);
}

function highlightChar(word, char, cls) {
  let r = '';
  for (const c of word) r += c === char ? `<mark class="${cls}">${c}</mark>` : c;
  return r;
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
  document.body.style.overflow = '';
  window.speechSynthesis.cancel();
}
function closeModalOutside(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

// ====================================================
// Web Speech API
// ====================================================
function speak(text) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ja-JP';
  u.rate = 0.85;
  u.pitch = 0.9;
  const v = speechSynthesis.getVoices().find(v => v.lang.startsWith('ja'));
  if (v) u.voice = v;
  speechSynthesis.speak(u);
}
function speakCurrent() { speak(currentKana); }

if ('speechSynthesis' in window) speechSynthesis.getVoices();

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
